# ============================================================================
# Nginx Configuration for Siv Frontend
# Server IP: 172.16.16.159
# Target Location: /etc/nginx/sites-available/siv-frontend
# ============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name siv.com www.siv.com 172.16.16.159;

    root /var/www/siv/frontend/dist;
    index index.html;

    # Gzip compression configuration for faster page loading
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Cache policies for assets (CSS, JS, media files)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # SPA routing fallback (try local file, then directory, fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Access and error log setup
    access_log /var/log/nginx/siv-frontend-access.log;
    error_log /var/log/nginx/siv-frontend-error.log;
}
